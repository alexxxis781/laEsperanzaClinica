<body>
    <main class="contenedor">
        <header class="header">
            <nav class="navegacion">
            <div class="logo-caja">
                <img src="img/logotipo.img.jpg" alt="logo" class="logo">
                <h1>Clinica la Esperanza</h1>
            </div>
            
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="especialidades.html">Especialidades</a></li>
                <li><a href="nosotros.html">Nosotros</a></li>
                <li><a href="citas.html">Citas</a></li>
            </ul>
        </nav>
        </header>

        <article class="article">

            <section class="form-section">
                <h2>Agendar Nueva Cita</h2>
                <form id="formCita">
                    <div class="input-group">
                        <label>Nombre Completo</label>
                        <input type="text" id="nombre" placeholder="Ej. Ana García" required>
                    </div>
    
                    <div class="input-group">
                        <label>Cédula / ID</label>
                        <input type="number" id="cedula" placeholder="12345678" required>
                    </div>
    
                    <div class="input-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="correo" placeholder="clinica@ejemplo.com" required>
                    </div>
    
                    <div class="input-group">
                        <label>Especialidad</label>
                        <select id="especialidad" required>
                            <option value="">Seleccione...</option>
                            <option value="Medicina General">Medicina General</option>
                            <option value="Cardiología">Cardiología</option>
                            <option value="Bioanalicis">Bioanalicis</option>
                            <option value="Pediatría">Pediatría</option>
                            <option value="Quirofano">Quirofano</option>
                            <option value="Rayos-x">Rayos X</option>
                        </select>
                    </div>
    
                    <div class="input-group">
                        <label>Fecha</label>
                        <input type="date" id="fecha" required>
                    </div>
    
                    <button type="submit" id="btnGuardar">Guardar Cita</button>
                </form>
            </section>
    
            <hr>
    
            <section class="table-section">
                <h2>Mis Citas Guardadas</h2>
                <div style="overflow-x: auto;">
                    <table id="tablaCitas">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Cédula</th>
                                <th>Especialidad</th>
                                <th>Fecha</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                </div>
            </section>
        </div>
        </article>
